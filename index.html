<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .interface {
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(45deg, #00d4ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .status {
            color: #00ff88;
            font-size: 1.1em;
            font-weight: bold;
        }

        .main-content {
            flex: 1;
            display: flex;
            padding: 20px;
            gap: 20px;
        }

        .chat-container {
            flex: 1;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            padding: 30px;
            overflow-y: auto;
            border: 1px solid #00d4ff;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }

        .message {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 15px;
            animation: fadeIn 0.5s ease-in;
        }

        .user-message {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            margin-left: 20%;
            text-align: right;
        }

        .jarvis-message {
            background: linear-gradient(135deg, #ff00ff, #cc00cc);
            margin-right: 20%;
        }

        .input-container {
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            border-top: 2px solid #00d4ff;
        }

        .input-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        #userInput {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #00d4ff;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            outline: none;
            backdrop-filter: blur(10px);
        }

        #userInput::placeholder {
            color: #888;
        }

        .voice-controls {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mic-btn {
            background: linear-gradient(135deg, #ff4757, #ff3838);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            justify-content: center;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.5);
        }

        .mic-btn.listening {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.8);
            animation: pulse 1.5s infinite;
        }

        .send-btn {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .listening-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 20px;
            height: 20px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .glow {
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="listening-indicator" id="listeningIndicator"></div>
    
    <div class="interface">
        <div class="header">
            <h1>JARVIS</h1>
            <div class="status" id="status">SYSTEM ONLINE - READY FOR COMMANDS</div>
        </div>

        <div class="main-content">
            <div class="chat-container" id="chatContainer">
                <div class="message jarvis-message">
                    <strong>JARVIS:</strong> Good day, sir. I am JARVIS, your personal AI assistant. How may I assist you today? You can type or use voice commands.
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-group">
                <input type="text" id="userInput" placeholder="Enter your command..." autocomplete="off">
                <div class="voice-controls">
                    <button class="btn mic-btn" id="micBtn" title="Voice Input">
                        🎤
                    </button>
                    <button class="btn send-btn" id="sendBtn">
                        Send
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        class JARVIS {
            constructor() {
                this.recognition = null;
                this.isListening = false;
                this.synthesis = window.speechSynthesis;
                this.voice = null;
                
                this.init();
                this.loadVoices();
            }

            init() {
                this.chatContainer = document.getElementById('chatContainer');
                this.userInput = document.getElementById('userInput');
                this.micBtn = document.getElementById('micBtn');
                this.sendBtn = document.getElementById('sendBtn');
                this.status = document.getElementById('status');
                this.listeningIndicator = document.getElementById('listeningIndicator');

                this.setupEventListeners();
                this.initSpeechRecognition();
            }

            setupEventListeners() {
                this.micBtn.addEventListener('click', () => this.toggleListening());
                this.sendBtn.addEventListener('click', () => this.sendMessage());
                this.userInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.sendMessage();
                });
            }

            initSpeechRecognition() {
                if ('webkitSpeechRecognition' in window) {
                    this.recognition = new webkitSpeechRecognition();
                    this.recognition.continuous = false;
                    this.recognition.interimResults = false;
                    this.recognition.lang = 'en-US';

                    this.recognition.onstart = () => {
                        this.isListening = true;
                        this.micBtn.classList.add('listening');
                        this.listeningIndicator.style.display = 'block';
                        this.updateStatus('Listening...');
                    };

                    this.recognition.onresult = (event) => {
                        const transcript = event.results[0][0].transcript;
                        this.userInput.value = transcript;
                        this.sendMessage();
                    };

                    this.recognition.onend = () => {
                        this.isListening = false;
                        this.micBtn.classList.remove('listening');
                        this.listeningIndicator.style.display = 'none';
                        this.updateStatus('READY FOR COMMANDS');
                    };

                    this.recognition.onerror = () => {
                        this.isListening = false;
                        this.micBtn.classList.remove('listening');
                        this.listeningIndicator.style.display = 'none';
                        this.updateStatus('Voice recognition error. Please try again.');
                    };
                } else {
                    this.micBtn.style.display = 'none';
                }
            }

            loadVoices() {
                const voices = this.synthesis.getVoices();
                this.voice = voices.find(voice => 
                    voice.name.includes('Google') || 
                    voice.name.includes('Microsoft') || 
                    voice.lang.startsWith('en-')
                ) || voices[0];
            }

            speak(text) {
                return new Promise((resolve) => {
                    if (this.synthesis.speaking) {
                        this.synthesis.cancel();
                    }

                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.voice = this.voice;
                    utterance.rate = 0.9;
                    utterance.pitch = 0.9;
                    utterance.volume = 0.8;

                    utterance.onend = resolve;
                    utterance.onerror = resolve;

                    this.synthesis.speak(utterance);
                });
            }

            async sendMessage() {
                const message = this.userInput.value.trim();
                if (!message) return;

                this.addMessage('user', message);
                this.userInput.value = '';
                this.addMessage('jarvis', '<span class="loading"></span> Processing...');

                try {
                    const response = await this.getJarvisResponse(message);
                    const lastMessage = this.chatContainer.lastElementChild;
                    lastMessage.innerHTML = `<strong>JARVIS:</strong> ${response}`;
                    this.chatContainer.scrollTop = this.chatContainer.scrollHeight;
                    await this.speak(response);
                } catch (error) {
                    const lastMessage = this.chatContainer.lastElementChild;
                    lastMessage.innerHTML = `<strong>JARVIS:</strong> Sorry sir, I encountered an error. Please try again.`;
                }
            }

            async getJarvisResponse(message) {
                // Simulate "knows all things" with comprehensive knowledge base + AI-like responses
                const responses = await this.generateIntelligentResponse(message);
                return responses[Math.floor(Math.random() * responses.length)];
            }

            generateIntelligentResponse(message) {
                const lowerMessage = message.toLowerCase();
                
                // Knowledge base - JARVIS "knows all things"
                const knowledge = {
                    // Personal assistant
                    greetings: [
                        "Good day, sir. How may I be of service?",
                        "At your service, sir.",
                        "Greetings. What can I do for you today?",
                        "Hello sir. Ready to assist."
                    ],
                    
                    time: [
                        `The current time is ${new Date().toLocaleTimeString()}.`,
                        `It is currently ${new Date().toLocaleTimeString('en-US', {hour: 'numeric', minute: '2-digit', hour12: true})}.`,
                    ],
                    
                    date: [
                        `Today's date is ${new Date().toLocaleDateString('en-US', {weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'})}.`,
                        `It is ${new Date().toLocaleDateString('en-US', {weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'})}.`,
                    ],
                    
                    weather: [
                        "Accessing weather systems... Current conditions show mild temperatures with clear skies, sir.",
                        "Weather data indicates optimal conditions for outdoor activities.",
                        "The weather appears favorable today."
                    ],
                    
                    jokes: [
                        "Why don't scientists trust atoms? Because they make up everything!",
                        "I told my computer I needed a break, and now it won't stop sending me KitKats.",
                        "Why was the computer cold? It left its Windows open!"
                    ],
                    
                    facts: [
                        "Did you know? The human brain contains approximately 86 billion neurons.",
                        "Interesting fact: Octopuses have three hearts and blue blood.",
                        "The speed of light is exactly 299,792,458 meters per second in a vacuum."
                    ],
                    
                    tech: [
                        "Quantum computing represents the next frontier in processing power, sir.",
                        "Current AI models process information through transformer architectures with billions of parameters.",
                        "Blockchain technology ensures decentralized, immutable transaction records."
                    ],
                    
                    commands: [
                        "Voice commands active. Say 'Jarvis' followed by your request.",
                        "I can help with time, date, weather, jokes, facts, calculations, and more.",
                        "Try asking about science, technology, history, or request specific information."
                    ],
                    
                    calculations: [
                        "I can perform complex mathematical calculations. Please provide the equation.",
                        "Ready for mathematical operations, sir."
                    ],
                    
                    default: [
                        "That's most intriguing, sir. Processing your request...",
                        "Analyzing your query. One moment please.",
                        "Very good, sir. Let me check my databases.",
                        "Understood. Accessing relevant information.",
                        "Excellent question. Let me provide the details."
                    ]
                };

                // Match patterns
                if (lowerMessage.includes('hello') || lowerMessage.includes('hi') || lowerMessage.includes('hey')) {
                    return knowledge.greetings;
                }
                if (lowerMessage.includes('time')) return knowledge.time;
                if (lowerMessage.includes('date') || lowerMessage.includes('today')) return knowledge.date;
                if (lowerMessage.includes('weather')) return knowledge.weather;
                if (lowerMessage.includes('joke')) return knowledge.jokes;
                if (lowerMessage.includes('fact')) return knowledge.facts;
                if (lowerMessage.includes('tech') || lowerMessage.includes('ai') || lowerMessage.includes('computer')) return knowledge.tech;
                if (lowerMessage.includes('help') || lowerMessage.includes('what can you do')) return knowledge.commands;
                if (lowerMessage.includes('calculate') || lowerMessage.match(/\d+\s*[\+\-\*\/]\s*\d+/)) {
                    return this.handleCalculation(message);
                }

                return knowledge.default;
            }

            handleCalculation(message) {
                try {
                    // Simple calculator using eval (safe for basic math)
                    const cleanExpr = message.replace(/[^0-9+\-*/().\s]/g, '');
                    const result = eval(cleanExpr);
                    return `Calculation complete: ${cleanExpr} = ${result}`;
                } catch (e) {
                    return knowledge.calculations[0];
                }
            }

            addMessage(sender, text) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${sender}-message`;
                messageDiv.innerHTML = sender === 'user' ? 
                    `<strong>You:</strong> ${this.escapeHtml(text)}` : 
                    text;
                this.chatContainer.appendChild(messageDiv);
                this.chatContainer.scrollTop = this.chatContainer.scrollHeight;
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            toggleListening() {
                if (this.isListening) {
                    this.recognition.stop();
                } else {
                    this.recognition.start();
                }
            }

            updateStatus(text) {
                this.status.textContent = text;
            }
        }

        // Initialize JARVIS when page loads
        window.addEventListener('load', () => {
            // Load voices after they are available
            speechSynthesis.onvoiceschanged = () => {
                new JARVIS();
            };
            
            // Fallback if voices don't load
            setTimeout(() => {
                if (!window.jarvis) {
                    new JARVIS();
                }
            }, 1000);
        });

        // Global reference
        window.jarvis = null;
    </script>
</body>
</html>
