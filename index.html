<!DOCTYPE html>
<html>
<head>
    <title>Minecraft Clone</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            border: 2px solid #333;
            background: #87CEEB;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }
        .controls {
            margin-top: 10px;
            text-align: center;
        }
        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="hud">
        <div>Block: <span id="blockType">Grass</span></div>
        <div>X: <span id="posX">0</span> Y: <span id="posY">0</span></div>
    </div>
    <canvas id="game" width="800" height="600"></canvas>
    <div class="controls">
        <div>WASD/Arrows: Move | Mouse: Look | Click: Break/Place | 1-3: Block types</div>
        <div>Hold Shift: Run | Space: Jump | R: Reset world</div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;

        // Game state
        const WORLD_WIDTH = 128;
        const WORLD_HEIGHT = 64;
        const BLOCK_SIZE = 16;
        const CHUNK_SIZE = 32;

        let world = new Array(WORLD_HEIGHT).fill(null).map(() => new Array(WORLD_WIDTH).fill(0));
        let player = { x: 64, y: 20, vx: 0, vy: 0, width: 12, height: 20, onGround: false, speed: 0.2, jump: -6 };
        let camera = { x: 0, y: 0 };
        let keys = {};
        let mouse = { x: 0, y: 0, down: false };
        let selectedBlock = 1; // 0=air, 1=grass, 2=dirt, 3=stone
        let blockNames = ['Air', 'Grass', 'Dirt', 'Stone'];

        // Block colors
        const blockColors = [
            [0, 0, 0, 0],      // Air (transparent)
            [34, 139, 34, 255], // Grass
            [139, 69, 19, 255], // Dirt
            [128, 128, 128, 255] // Stone
        ];

        // Generate terrain
        function generateWorld() {
            for (let x = 0; x < WORLD_WIDTH; x++) {
                let height = 25 + Math.sin(x * 0.1) * 8 + Math.sin(x * 0.05) * 4;
                for (let y = 0; y < WORLD_HEIGHT; y++) {
                    if (y > height) {
                        if (y > height + 8) {
                            world[y][x] = 3; // Stone
                        } else if (y > height + 3) {
                            world[y][x] = 2; // Dirt
                        } else {
                            world[y][x] = 1; // Grass
                        }
                    }
                }
            }
        }

        // Collision detection
        function collides(x, y, w, h) {
            const left = Math.floor(x / BLOCK_SIZE);
            const right = Math.floor((x + w) / BLOCK_SIZE);
            const top = Math.floor(y / BLOCK_SIZE);
            const bottom = Math.floor((y + h) / BLOCK_SIZE);

            for (let by = top; by <= bottom; by++) {
                for (let bx = left; bx <= right; bx++) {
                    if (bx >= 0 && bx < WORLD_WIDTH && by >= 0 && by < WORLD_HEIGHT) {
                        if (world[by][bx] !== 0) return true;
                    }
                }
            }
            return false;
        }

        // Update player physics
        function updatePlayer() {
            // Input
            let speed = keys['Shift'] ? player.speed * 2 : player.speed;
            if (keys['a'] || keys['A'] || keys['ArrowLeft']) player.vx = -speed;
            else if (keys['d'] || keys['D'] || keys['ArrowRight']) player.vx = speed;
            else player.vx *= 0.8;

            if ((keys['w'] || keys['W'] || keys['ArrowUp'] || keys[' ']) && player.onGround) {
                player.vy = player.jump;
                player.onGround = false;
            }

            // Gravity
            player.vy += 0.2;
            if (player.vy > 8) player.vy = 8;

            // Move X
            let newX = player.x + player.vx;
            if (!collides(newX, player.y, player.width, player.height)) {
                player.x = newX;
            }

            // Move Y
            let newY = player.y + player.vy;
            if (collides(player.x, newY, player.width, player.height)) {
                if (player.vy > 0) {
                    player.onGround = true;
                }
                player.vy = 0;
                while (!collides(player.x, newY, player.width, player.height)) {
                    newY += player.vy > 0 ? 1 : -1;
                }
                player.y = newY;
            } else {
                player.y = newY;
                player.onGround = false;
            }

            // Camera follow
            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;
        }

        // Mouse interaction
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        canvas.addEventListener('click', (e) => {
            const worldX = Math.floor((mouse.x + camera.x) / BLOCK_SIZE);
            const worldY = Math.floor((mouse.y + camera.y) / BLOCK_SIZE);
            
            if (worldX >= 0 && worldX < WORLD_WIDTH && worldY >= 0 && worldY < WORLD_HEIGHT) {
                if (e.button === 0) { // Left click - break
                    world[worldY][worldX] = 0;
                } else if (e.button === 2) { // Right click - place
                    if (!collides(worldX * BLOCK_SIZE, worldY * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE)) {
                        world[worldY][worldX] = selectedBlock;
                    }
                }
            }
        });

        canvas.addEventListener('contextmenu', e => e.preventDefault());

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key >= '1' && e.key <= '3') {
                selectedBlock = parseInt(e.key);
                document.getElementById('blockType').textContent = blockNames[selectedBlock];
            }
            if (e.key.toLowerCase() === 'r') {
                generateWorld();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Render
        function render() {
            // Clear
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // World
            const startX = Math.max(0, Math.floor(camera.x / BLOCK_SIZE) - 1);
            const endX = Math.min(WORLD_WIDTH, Math.floor((camera.x + canvas.width) / BLOCK_SIZE) + 1);
            const startY = Math.max(0, Math.floor(camera.y / BLOCK_SIZE) - 1);
            const endY = Math.min(WORLD_HEIGHT, Math.floor((camera.y + canvas.height) / BLOCK_SIZE) + 1);

            for (let y = startY; y < endY; y++) {
                for (let x = startX; x < endX; x++) {
                    const block = world[y][x];
                    if (block !== 0) {
                        ctx.fillStyle = `rgba(${blockColors[block][0]}, ${blockColors[block][1]}, ${blockColors[block][2]}, ${blockColors[block][3]/255})`;
                        ctx.fillRect(
                            x * BLOCK_SIZE - camera.x,
                            y * BLOCK_SIZE - camera.y,
                            BLOCK_SIZE,
                            BLOCK_SIZE
                        );

                        // Block outline
                        ctx.strokeStyle = '#000';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(
                            x * BLOCK_SIZE - camera.x,
                            y * BLOCK_SIZE - camera.y,
                            BLOCK_SIZE,
                            BLOCK_SIZE
                        );
                    }
                }
            }

            // Player
            ctx.fillStyle = '#FF6B6B';
            ctx.fillRect(player.x - camera.x, player.y - camera.y, player.width, player.height);
            ctx.fillStyle = '#FFF';
            ctx.fillRect(player.x - camera.x + 2, player.y - camera.y + 2, 8, 8); // Eyes

            // Crosshair
            ctx.strokeStyle = '#FFF';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(mouse.x - 8, mouse.y);
            ctx.lineTo(mouse.x + 8, mouse.y);
            ctx.moveTo(mouse.x, mouse.y - 8);
            ctx.lineTo(mouse.x, mouse.y + 8);
            ctx.stroke();

            // Update HUD
            document.getElementById('posX').textContent = Math.floor(player.x / BLOCK_SIZE);
            document.getElementById('posY').textContent = Math.floor(player.y / BLOCK_SIZE);
        }

        // Game loop
        function gameLoop() {
            updatePlayer();
            render();
            requestAnimationFrame(gameLoop);
        }

        // Start game
        generateWorld();
        gameLoop();
    </script>
</body>
</html>
