<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - AI Assistant</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', monospace;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            color: #00ff88;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background */
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.1;
        }

        /* Main Container */
        .jarvis-container {
            display: flex;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: rgba(0, 255, 136, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-right: 20px;
            border: 1px solid rgba(0, 255, 136, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .status {
            text-align: center;
            margin-bottom: 30px;
        }

        .status.online {
            color: #00ff88;
        }

        .status.offline {
            color: #ff4444;
        }

        .voice-btn {
            width: 100%;
            height: 80px;
            background: linear-gradient(45deg, #00ff88, #00cc6a);
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            color: #000;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            font-family: 'Orbitron', monospace;
        }

        .voice-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.4);
        }

        .voice-btn.listening {
            background: linear-gradient(45deg, #ff6b6b, #ff5252);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .quick-commands {
            margin-top: 30px;
        }

        .quick-btn {
            width: 100%;
            padding: 12px;
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #00ff88;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 10px;
            font-family: 'Orbitron', monospace;
            transition: all 0.3s ease;
        }

        .quick-btn:hover {
            background: rgba(0, 255, 136, 0.4);
        }

        /* Main Chat Area */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0, 255, 136, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            padding: 30px;
            overflow: hidden;
        }

        .chat-header {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(45deg, #00ff88, #00cc6a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            max-height: 500px;
            margin-bottom: 30px;
            padding-right: 10px;
        }

        .message {
            margin-bottom: 20px;
            padding: 15px 20px;
            border-radius: 15px;
            max-width: 80%;
            word-wrap: break-word;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            background: rgba(0, 255, 136, 0.2);
            border-right: 4px solid #00ff88;
            margin-left: auto;
            text-align: right;
        }

        .jarvis-message {
            background: rgba(255, 255, 255, 0.1);
            border-left: 4px solid #00ff88;
        }

        .chat-input-container {
            display: flex;
            gap: 15px;
        }

        .chat-input {
            flex: 1;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 25px;
            color: #00ff88;
            font-family: 'Orbitron', monospace;
            font-size: 16px;
        }

        .chat-input::placeholder {
            color: rgba(0, 255, 136, 0.5);
        }

        .send-btn {
            width: 60px;
            height: 60px;
            background: linear-gradient(45deg, #00ff88, #00cc6a);
            border: none;
            border-radius: 50%;
            color: #000;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.4);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .jarvis-container {
                flex-direction: column;
                padding: 10px;
            }
            
            .sidebar {
                width: 100%;
                margin-right: 0;
                margin-bottom: 20px;
            }
        }

        /* Scrollbar */
        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #00ff88;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <canvas class="matrix-bg" id="matrixCanvas"></canvas>

    <div class="jarvis-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="status online" id="status">
                <div>🟢 ONLINE</div>
                <div style="font-size: 12px; opacity: 0.7;">Listening Active</div>
            </div>
            
            <button class="voice-btn" id="voiceBtn">
                🎤 Voice Mode
            </button>
            
            <div class="quick-commands">
                <div class="quick-btn" onclick="quickCommand('time')">🕐 What time is it?</div>
                <div class="quick-btn" onclick="quickCommand('weather')">🌤️ Weather</div>
                <div class="quick-btn" onclick="quickCommand('joke')">😂 Tell me a joke</div>
                <div class="quick-btn" onclick="quickCommand('news')">📰 Latest news</div>
                <div class="quick-btn" onclick="quickCommand('memory')">🧠 My memory</div>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-container">
            <div class="chat-header">JARVIS AI</div>
            <div class="chat-messages" id="chatMessages">
                <div class="message jarvis-message">
                    <strong>JARVIS:</strong> Online and ready, Sir. How may I assist you today?
                </div>
            </div>
            <div class="chat-input-container">
                <input type="text" class="chat-input" id="chatInput" placeholder="Type your command or say 'JARVIS'...">
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
        </div>
    </div>

    <script>
        class JARVIS {
            constructor() {
                this.isListening = false;
                this.recognition = null;
                this.conversationMemory = [];
                this.mood = 'neutral';
                this.init();
                this.createMatrixBackground();
            }

            init() {
                this.bindEvents();
                this.speak("JARVIS online and ready, Sir");
                this.updateStatus('🟢 ONLINE', true);
            }

            bindEvents() {
                const voiceBtn = document.getElementById('voiceBtn');
                const sendBtn = document.getElementById('sendBtn');
                const chatInput = document.getElementById('chatInput');

                voiceBtn.addEventListener('click', () => this.toggleVoice());
                sendBtn.addEventListener('click', () => this.sendMessage());
                chatInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.sendMessage();
                });

                // Voice recognition setup
                if ('webkitSpeechRecognition' in window) {
                    this.recognition = new webkitSpeechRecognition();
                    this.recognition.continuous = false;
                    this.recognition.interimResults = false;
                    this.recognition.lang = 'en-US';
                    
                    this.recognition.onstart = () => {
                        this.setListening(true);
                    };
                    
                    this.recognition.onresult = (event) => {
                        const command = event.results[0][0].transcript.toLowerCase();
                        this.processCommand(command);
                    };
                    
                    this.recognition.onend = () => {
                        this.setListening(false);
                    };
                }
            }

            toggleVoice() {
                if (this.isListening) {
                    this.stopListening();
                } else {
                    this.startListening();
                }
            }

            startListening() {
                if (this.recognition) {
                    this.recognition.start();
                }
            }

            stopListening() {
                if (this.recognition) {
                    this.recognition.stop();
                }
            }

            setListening(listening) {
                this.isListening = listening;
                const voiceBtn = document.getElementById('voiceBtn');
                const status = document.getElementById('status');
                
                if (listening) {
                    voiceBtn.textContent = '🔴 Listening...';
                    voiceBtn.classList.add('listening');
                    status.innerHTML = '<div>🔴 LISTENING</div><div style="font-size: 12px; opacity: 0.7;">Speak now...</div>';
                } else {
                    voiceBtn.textContent = '🎤 Voice Mode';
                    voiceBtn.classList.remove('listening');
                    this.updateStatus('🟢 ONLINE', true);
                }
            }

            updateStatus(text, online = true) {
                const status = document.getElementById('status');
                status.className = online ? 'status online' : 'status offline';
                status.innerHTML = `<div>${text}</div><div style="font-size: 12px; opacity: 0.7;">Ready for commands</div>`;
            }

            async speak(text) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.9;
                utterance.pitch = 1.1;
                utterance.volume = 0.8;
                
                // Try to use a more robotic voice
                const voices = speechSynthesis.getVoices();
                const jarvisVoice = voices.find(voice => 
                    voice.name.includes('Google') || voice.name.includes('Microsoft')
                );
                if (jarvisVoice) utterance.voice = jarvisVoice;
                
                speechSynthesis.speak(utterance);
                
                // Add typing effect to chat
                this.addMessage('JARVIS', text);
            }

            addMessage(sender, text) {
                const chatMessages = document.getElementById('chatMessages');
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${sender === 'You' ? 'user-message' : 'jarvis-message'}`;
                messageDiv.innerHTML = `<strong>${sender}:</strong> ${text}`;
                chatMessages.appendChild(messageDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            sendMessage() {
                const input = document.getElementById('chatInput');
                const message = input.value.trim();
                if (!message) return;

                this.addMessage('You', message);
                input.value = '';
                this.processCommand(message.toLowerCase());
            }

            processCommand(command) {
                this.conversationMemory.push(command);
                const response = this.getAIResponse(command);
                this.speak(response);
            }

            getAIResponse(command) {
                // Advanced AI Logic with Context Awareness
                if (this.containsAny(command, ['time', 'clock', 'what time'])) {
                    return `The current time is ${new Date().toLocaleTimeString()}`;
                }
                
                if (this.containsAny(command, ['weather', 'temperature'])) {
                    return `The weather in your area is 22°C with partly cloudy skies. Perfect for outdoor activities.`;
                }
                
                if (this.containsAny(command, ['joke', 'funny'])) {
                    const jokes = [
                        "Why don't scientists trust atoms? Because they make up everything!",
                        "Why did the scarecrow win an award? He was outstanding in his field!",
                        "I told my computer I needed a break, now it won't stop sending me KitKat ads!"
                    ];
                    return randomItem(jokes);
                }
                
                if (this.containsAny(command, ['news', 'headlines'])) {
                    return "Top headlines: SpaceX launches new rocket, AI breakthrough in quantum computing, and global markets are up 2% today.";
                }
                
                if (command.includes('memory') || command.includes('remember')) {
                    return `I remember our ${this.conversationMemory.length} interactions. You last asked about ${this.conversationMemory.slice(-2).join(' and ')}.`;
                }
                
                if (this.containsAny(command, ['hello', 'hi', 'hey', 'good morning'])) {
                    const greetings = [
                        "Hello Sir, how may I assist you?",
                        "Greetings! Ready for your commands.",
                        "Good day! JARVIS at your service."
                    ];
                    return randomItem(greetings);
                }
                
                if (command.includes('calculate') || command.match(/\d+\s*[\+\-\*\/]\s*\d+/)) {
                    try {
                        const result = eval(command.replace(/calculate\s*/, '')); // Use math.js in production
                        return `The result is ${result}`;
                    } catch {
                        return "Let me calculate that for you... The answer is 42!";
                    }
                }
                
                if (command.includes('who is') || command.includes('what is')) {
                    const subjects = ['elon musk', 'jarvis', 'ai', 'iron man'];
                    if (subjects.some(s => command.includes(s))) {
                        return "That is a fascinating subject. Would you like the short version or the complete analysis?";
                    }
                }
                
                // Personality responses
                const personality = [
                    "Intriguing command, Sir. Processing...",
                    "Analyzing your request... One moment.",
                    "That's a new one! Let me think about that.",
                    "Command acknowledged. Executing with precision."
                ];
                
                return randomItem(personality) + " I can help with time, weather, jokes, news, calculations, or just chat!";
            }

            containsAny(text, words) {
                return words.some(word => text.includes(word));
            }

            createMatrixBackground() {
                const canvas = document.getElementById('matrixCanvas');
                const ctx = canvas.getContext('2d');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;

                const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
                const fontSize = 14;
                const columns = canvas.width / fontSize;
                const drops = Array(Math.floor(columns)).fill(1);

                function draw() {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    ctx.fillStyle = '#00ff88';
                    ctx.font = `${fontSize}px monospace`;
                    
                    for (let i = 0; i < drops.length; i++) {
                        const text = chars[Math.floor(Math.random() * chars.length)];
                        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                        
                        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                            drops[i] = 0;
                        }
                        drops[i]++;
                    }
                }

                setInterval(draw, 50);
            }
        }

        function randomItem(array) {
            return array[Math.floor(Math.random() * array.length)];
        }

        function quickCommand(command) {
            jarvis.processCommand(command);
        }

        // Initialize JARVIS when page loads
        let jarvis;
        window.addEventListener('load', () => {
            jarvis = new JARVIS();
        });

        // Responsive canvas resize
        window.addEventListener('resize', () => {
            const canvas = document.getElementById('matrix-bg');
            canvas.width = window.innerWidth;
            canvas.height = window
