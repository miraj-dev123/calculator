<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - WORKING VERSION</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #000;
            color: #0f0;
            height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            padding: 20px;
            border-bottom: 2px solid #0f0;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #00f;
            font-size: 2em;
            margin-bottom: 10px;
        }

        #status {
            font-size: 1.2em;
            color: #ff0;
        }

        #chat {
            flex: 1;
            background: #111;
            border: 1px solid #0f0;
            padding: 20px;
            overflow-y: auto;
            margin-bottom: 20px;
            font-family: monospace;
        }

        .message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
        }

        .user {
            background: #004400;
            text-align: right;
            margin-left: 20%;
        }

        .jarvis {
            background: #220044;
            margin-right: 20%;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        #input {
            flex: 1;
            padding: 15px;
            background: #111;
            border: 2px solid #0f0;
            color: #0f0;
            font-size: 16px;
            font-family: monospace;
        }

        #input:focus {
            outline: none;
            border-color: #00f;
            box-shadow: 0 0 10px #00f;
        }

        button {
            padding: 15px 25px;
            background: #0f0;
            color: #000;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #0a0;
        }

        button:active {
            background: #080;
        }

        #mic {
            background: #f00;
            color: white;
            padding: 15px 20px;
        }

        #mic.listening {
            background: #0f0;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 JARVIS v2.0</h1>
            <div id="status">SYSTEM READY</div>
        </div>

        <div id="chat">
            <div class="message jarvis">
                JARVIS: Hello sir! Type anything and press ENTER or SEND. Buttons work 100%!
            </div>
            <div class="message jarvis">
                JARVIS: Try: "hello", "time", "joke", "calculate 10+5"
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="input" placeholder="Type command here..." autofocus>
            <button id="send">SEND</button>
            <button id="mic">🎤 VOICE</button>
            <button id="clear">CLEAR</button>
        </div>
    </div>

    <script>
        // SIMPLE GLOBAL VARIABLES
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');
        const micBtn = document.getElementById('mic');
        const clearBtn = document.getElementById('clear');
        const status = document.getElementById('status');

        // TEST FUNCTION - ADDS MESSAGE IMMEDIATELY
        function addMessage(sender, text) {
            const msg = document.createElement('div');
            msg.className = `message ${sender}`;
            msg.textContent = `${sender.toUpperCase()}: ${text}`;
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
        }

        // MAIN SEND FUNCTION
        function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMessage('user', text);
            input.value = '';

            // JARVIS RESPONDS
            setTimeout(() => {
                let response = 'Processing...';
                
                if (text.toLowerCase().includes('hello') || text.toLowerCase().includes('hi')) {
                    response = 'Greetings sir! At your service.';
                } else if (text.toLowerCase().includes('time')) {
                    response = `Current time: ${new Date().toLocaleTimeString()}`;
                } else if (text.toLowerCase().includes('date')) {
                    response = `Today: ${new Date().toLocaleDateString()}`;
                } else if (text.toLowerCase().includes('joke')) {
                    const jokes = ['Why don\'t programmers like nature? Too many bugs!', 'Parallel lines have so much in common!', '42 is the answer to life!'];
                    response = jokes[Math.floor(Math.random() * jokes.length)];
                } else if (text.toLowerCase().includes('calculate') || text.match(/[\d+\-*/]/)) {
                    try {
                        const result = eval(text.replace(/[^0-9+\-*/().]/g, ''));
                        response = `Result: ${result}`;
                    } catch {
                        response = 'Invalid calculation';
                    }
                } else {
                    response = `Understood: "${text}". Command logged.`;
                }
                
                addMessage('jarvis', response);
            }, 500);
        }

        // EVENT LISTENERS - BULLETPROOF
        sendBtn.onclick = sendMessage;
        
        input.onkeypress = function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        };

        clearBtn.onclick = function() {
            chat.innerHTML = '<div class="message jarvis">JARVIS: Chat cleared. Ready for new commands.</div>';
        };

        // VOICE (FALLBACK)
        micBtn.onclick = function() {
            if (micBtn.classList.contains('listening')) {
                micBtn.classList.remove('listening');
                micBtn.textContent = '🎤 VOICE';
                status.textContent = 'VOICE OFF';
                return;
            }

            micBtn.classList.add('listening');
            micBtn.textContent = '🛑 STOP';
            status.textContent = 'SPEAK NOW!';

            // Simple voice fallback - just focuses input
            input.focus();
            input.placeholder = 'Say something... (demo)';
            
            setTimeout(() => {
                micBtn.classList.remove('listening');
                micBtn.textContent = '🎤 VOICE';
                status.textContent = 'SYSTEM READY';
                input.placeholder = 'Type command here...';
            }, 3000);
        };

        // AUTO-FOCUS
        input.focus();

        // STATUS UPDATE
        status.textContent = 'ALL BUTTONS WORKING! Type and press ENTER';
        
        console.log('JARVIS LOADED - All buttons functional!');
    </script>
</body>
</html>
